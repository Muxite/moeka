# Moeka container topology.
#
# Two service profiles: `gateway` (default, chat channels) and `api` (HTTP API).
# Both share the same image and bind-mount ONE host directory so everything
# Moeka cares about persists across `docker compose down`:
#
#   ${MOEKA_WORKSPACE} -> /home/nanobot/.nanobot   (config + agent files + runtime state)
#
# The default is `~/.nanobot` to stay compatible with upstream nanobot paths.
# Override per-shell by exporting MOEKA_WORKSPACE, or set it in the sibling
# `.env` file (see `.env.example`).
#
# The gateway uses `network_mode: host` + `pid: host` so it can:
#   * reach the LAN (e.g. local services) without docker-proxy
#   * see host processes for inspection
#   * run `nsenter` via the host-bridge exec tool (MOEKA_EXEC_ON_HOST=1)
#
# Secrets live in ./keys.env (gitignored). Non-secret runtime config lives in ./.env.

x-common-env: &common-env
  MOEKA_WORKSPACE: /home/nanobot/.nanobot
  MOEKA_EXEC_ON_HOST: "1"

x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - path: ./.env
      required: false
    - path: ./keys.env
      required: false
  environment:
    <<: *common-env
  volumes:
    # One directory holds config.json, history, media, cron, skills, memory,
    # sessions, and the agent-identity docs (SOUL/AGENTS/HEARTBEAT/TOOLS/USER).
    - ${MOEKA_WORKSPACE:-${HOME}/.nanobot}:/home/nanobot/.nanobot
    # Host filesystem passthrough — same paths inside the container as on the
    # host, so file tools (read_file/write_file/glob/grep) see the full host
    # tree without path translation.  Combined with the nsenter exec bridge,
    # this makes moeka behave as if it were running natively on the host.
    # (sudo capability is a separate, opt-in config — see tools.exec.allow_sudo)
    - /home:/home
    - /etc:/etc
    - /opt:/opt
    - /var:/var
    - /srv:/srv
    - /mnt:/mnt
    - /media:/media
    - /root:/root
    - /tmp:/tmp
  # Host-bridge exec (MOEKA_EXEC_ON_HOST=1) wraps shell commands in
  # `nsenter -t 1 -m -u -n -i -p --`. Caps needed:
  #   SYS_ADMIN/SYS_PTRACE/SYS_CHROOT — nsenter into host namespaces
  #   SETUID/SETGID — sudo can change uid/gid after entering host namespace
  #   DAC_OVERRIDE — read files owned by other users on the host (non-sudo)
  #   FOWNER — file operations across uid boundaries
  # All caps are baked into /usr/bin/nsenter as file capabilities so the
  # non-root nanobot user can use them only through nsenter.
  cap_drop:
    - ALL
  cap_add:
    - SYS_ADMIN     # setns(CLONE_NEWNS/NEWUTS/NEWNET/NEWIPC/NEWPID)
    - SYS_PTRACE    # open /proc/1/ns/* of the host's pid 1
    - SYS_CHROOT    # mount-namespace change during setns
    - SETUID        # sudo: setuid(0) after nsenter
    - SETGID        # sudo: setgid(0) after nsenter
    - DAC_OVERRIDE  # read/write files regardless of permission bits
    - FOWNER        # bypass ownership checks on host files
    - AUDIT_WRITE   # sudo audit logging (suppresses warning)
  security_opt:
    - apparmor=unconfined
    - seccomp=unconfined

services:
  moeka-gateway:
    container_name: moeka-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    # pid+network host: lets the host-bridge exec tool (`nsenter -t 1 ...`)
    # reach the host's processes and see the host's network/LAN.
    pid: host
    network_mode: host
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  moeka-api:
    container_name: moeka-api
    <<: *common-config
    # The HTTP API serves the instance directory as its document root.
    command:
      ["serve", "--host", "0.0.0.0", "-w", "/home/nanobot/.nanobot"]
    restart: unless-stopped
    ports:
      - 127.0.0.1:8900:8900
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  moeka-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
